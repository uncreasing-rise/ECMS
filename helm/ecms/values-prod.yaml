image:
  repository: your-registry/ecms
  tag: prod

api:
  replicaCount: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

worker:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 65

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix

env:
  NODE_ENV: production
  PORT: "3000"
  REDIS_ENABLED: "true"
  REDIS_HOST: redis-master
  REDIS_PORT: "6379"
  MONGODB_DB: ecms
  ELASTICSEARCH_NODE: http://elasticsearch:9200
  AWS_REGION: ap-southeast-1
  CLOUDFRONT_DOMAIN: cdn.example.com

secret:
  create: false
  existingSecret: ecms-prod-secret
