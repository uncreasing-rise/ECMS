image:
  repository: ecms
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicaCount: 2
  command:
    - node
    - dist/main.js
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: true
  replicaCount: 1
  command:
    - node
    - dist/main-worker.js
  queueName: email.verification
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ecms.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

monitoring:
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics

grafana:
  dashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"

env:
  NODE_ENV: production
  PORT: "3000"
  REDIS_ENABLED: "true"
  REDIS_HOST: "redis-master"
  REDIS_PORT: "6379"
  MONGODB_DB: "ecms"
  ELASTICSEARCH_NODE: "http://elasticsearch:9200"
  AWS_REGION: "ap-southeast-1"
  CLOUDFRONT_DOMAIN: ""

secret:
  create: true
  existingSecret: ""
  data:
    DATABASE_URL: ""
    JWT_SECRET: ""
    REDIS_PASSWORD: ""
    RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
    MONGODB_URI: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    AWS_S3_BUCKET: ""
