{{- if .Values.grafana.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ecms.fullname" . }}-grafana-dashboard
  labels:
    {{- include "ecms.labels" . | nindent 4 }}
    {{- with .Values.grafana.dashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  ecms-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Requests Rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Process CPU Seconds",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "rate(process_cpu_user_seconds_total[5m])",
              "legendFormat": "cpu",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory Usage (Bytes)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "process_resident_memory_bytes",
              "legendFormat": "rss",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["ecms", "nestjs"],
      "title": "ECMS Overview",
      "version": 1
    }
{{- end }}
