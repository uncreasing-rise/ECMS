image:
  repository: your-registry/ecms
  tag: staging

api:
  replicaCount: 2

worker:
  enabled: true
  replicaCount: 1

autoscaling:
  enabled: false

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: ecms-staging.example.com
      paths:
        - path: /
          pathType: Prefix

env:
  NODE_ENV: production
  PORT: "3000"
  REDIS_ENABLED: "true"
  REDIS_HOST: redis-master
  REDIS_PORT: "6379"
  MONGODB_DB: ecms_staging
  ELASTICSEARCH_NODE: http://elasticsearch:9200
  AWS_REGION: ap-southeast-1
  CLOUDFRONT_DOMAIN: cdn-staging.example.com

secret:
  create: false
  existingSecret: ecms-staging-secret
